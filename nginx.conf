# =============================================================
# Nginx Production Config — kasulampua.id
# Didesain untuk berjalan di belakang Traefik reverse proxy.
# Port internal: 8082
# =============================================================

server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Keamanan ──────────────────────────────────────────────
    # Sembunyikan versi Nginx dari respons header
    server_tokens off;

    # Security headers (Traefik diharapkan menambahkan HSTS di level-nya)
    add_header X-Frame-Options           "SAMEORIGIN"             always;
    add_header X-Content-Type-Options    "nosniff"                always;
    add_header X-XSS-Protection          "1; mode=block"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── SPA Routing ───────────────────────────────────────────
    # Semua route diteruskan ke index.html agar Vue Router bekerja
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: CKAN API ───────────────────────────────────────
    # Menghindari CORS — browser memanggil /ckan-api,
    # Nginx meneruskan ke CKAN di data.kasulampua.id
    location /ckan-api/ {
        proxy_pass          https://data.kasulampua.id/api/3/action/;
        proxy_set_header    Host              data.kasulampua.id;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        # Cache hasil API selama 60 detik di sisi Nginx
        proxy_cache_valid   200 60s;
    }

    # ── Proxy: CKAN File ──────────────────────────────────────
    location /ckan-file/ {
        proxy_pass          https://data.kasulampua.id/;
        proxy_set_header    Host              data.kasulampua.id;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # ── Static Asset Caching ──────────────────────────────────
    # Vite menghasilkan nama file yang di-hash (contoh: index.4f2a1b.js)
    # sehingga aman di-cache sangat lama di browser
    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|ico|png|jpe?g|gif|webp|avif)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Health Check ──────────────────────────────────────────
    # Endpoint untuk health check container orchestrator / Traefik
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Error Pages ───────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
