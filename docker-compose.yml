# =============================================================
# Docker Compose — kasulampua.id
# Traffic Schema: Cloudflare Tunnel → Traefik → App (Nginx)
#
# Services:
#   - traefik   : Reverse proxy, menerima traffic dari CF Tunnel
#   - kasulampua: Vue SPA served by Nginx
#
# Network:
#   - proxy_network (external): Shared network antara CF Tunnel, Traefik, & App
#
# Opsional: di file .env sejajar compose, set KASULAMPUA_DOMAIN=kasulampua.id
# untuk menyamakan pola dengan service datahub (PREFECT_DOMAIN, dll.).
# =============================================================

services:

  # ── Kasulampua Vue SPA ─────────────────────────────────────
  kasulampua:
    build:
      context: .
      dockerfile: Dockerfile
      # Cache target: image bisa di-cache per stage
      target: production

    image: kasulampua:latest
    container_name: kasulampua-app
    restart: unless-stopped

    # Port TIDAK di-expose ke host — hanya Traefik yang bisa akses via network
    expose:
      - "8082"

    environment:
      # Runtime environment — semua variabel dari .env.production
      # di-inject ke config.js oleh docker-entrypoint.sh
      - API_BASE_URL=${API_BASE_URL:-https://backend.kasulampua.id}
      - DATAHUB_BASE_URL=${DATAHUB_BASE_URL:-https://datahub.kasulampua.id}
      - PUBLICATION_API_BASE_URL=${PUBLICATION_API_BASE_URL:-https://datahub-api.kasulampua.id}
      - CKAN_BASE_URL=${CKAN_BASE_URL:-/ckan-api}
      - CKAN_FILE_BASE_URL=${CKAN_FILE_BASE_URL:-/ckan-file}

    networks:
      - proxy_network

    labels:
      # ---- Traefik reverse proxy labels (sama pola dengan stack datahub) ----
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_network"
      - "traefik.http.routers.kasulampua.rule=Host(`${KASULAMPUA_DOMAIN:-kasulampua.id}`) || Host(`www.${KASULAMPUA_DOMAIN:-kasulampua.id}`)"
      - "traefik.http.routers.kasulampua.entrypoints=web"
      - "traefik.http.services.kasulampua.loadbalancer.server.port=8082"
      # Optional: middleware for Cloudflare Tunnel auth
      # - "traefik.http.routers.kasulampua.middlewares=cf-auth@docker"

    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8082/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Networks ───────────────────────────────────────────────────
networks:
  proxy_network:
    external: true
    name: proxy_network

